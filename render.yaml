services:
  - type: web
    name: smart-voting-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PRESENTATION_MODE
        value: "true"
      - key: ALLOW_SERVER_CAMERA
        value: "false"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: smart_voting_system
      - key: VOTE_ENCRYPTION_KEY
        sync: false
